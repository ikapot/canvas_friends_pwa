<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITAPLA: 文豪イタコ・プラザ</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;700;900&family=Outfit:wght@300;600&display=swap"
        rel="stylesheet">

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@webllm/chat-sdk@latest"></script>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --text-main: #F5F5DC;
            --accent-cafe: #8B4513;
            --accent-salon: #FFD700;
            --accent-mountain: #ADD8E6;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --border-dim: rgba(255, 255, 255, 0.1);
            --font-serif: "Noto Serif JP", serif;
            --font-sans: "Inter", sans-serif;
            --font-outfit: "Outfit", sans-serif;
            --transition-smooth: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-serif);
            overflow-x: hidden;
            transition: var(--transition-smooth);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/p6.png');
            /* 粒子テクスチャ */
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.8;
            }
        }

        body[data-location="cafe"] {
            background: radial-gradient(circle at top, #2C1B0E 0%, #050505 100%);
            animation: bgPulse 10s infinite alternate;
        }

        body[data-location="salon"] {
            background: radial-gradient(circle at top, #1A1A1A 0%, #000000 100%);
            animation: bgPulse 8s infinite alternate;
        }

        body[data-location="mountain"] {
            background: radial-gradient(circle at top, #0A192F 0%, #050505 100%);
            animation: bgPulse 12s infinite alternate;
        }

        body[data-location="seaside"] {
            background: radial-gradient(circle at top, #0c3547 0%, #051a25 100%);
            animation: bgPulse 7s infinite alternate;
        }

        body[data-location="bar"] {
            background: radial-gradient(circle at top, #2a1a0a 0%, #100800 100%);
            animation: bgPulse 6s infinite alternate;
        }

        body[data-location="train"] {
            background: radial-gradient(circle at top, #1a1a2a 0%, #080810 100%);
            animation: bgPulse 9s infinite alternate;
        }

        body[data-location="volcano"] {
            background: radial-gradient(circle at top, #2a1010 0%, #0a0505 100%);
            animation: bgPulse 5s infinite alternate;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .btn-amazon {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #FF9900;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-amazon:hover {
            background: #FFB347;
            transform: translateY(-2px);
        }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-dim);
            transition: var(--transition-smooth);
        }

        header.scrolled {
            padding: 10px 25px;
            background: rgba(0, 0, 0, 0.8);
        }

        .location-nav {
            display: flex;
            gap: 20px;
        }

        .loc-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            filter: grayscale(1);
            opacity: 0.4;
            transition: 0.3s;
        }

        .loc-btn.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.2);
        }

        h1#appTitle {
            font-family: var(--font-outfit);
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 0;
            flex: 1;
            text-align: center;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .soul-power-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-outfit);
            font-size: 14px;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            cursor: help;
            transition: all 0.3s;
        }

        .soul-power-container:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        #ai-status-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0.6;
            font-family: var(--font-sans);
        }

        /* --- Entrance Layer --- */
        #entrance-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 1.5s ease-in-out;
        }

        .k-dialog-box {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            font-size: 20px;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        .k-input {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 24px;
            text-align: center;
            padding: 10px;
            outline: none;
            width: 300px;
            margin-top: 30px;
            font-family: var(--font-serif);
        }

        .btn-cosmic {
            margin-top: 40px;
            padding: 12px 40px;
            background: none;
            border: 1px solid #fff;
            color: #fff;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: 0.4s;
        }

        .btn-cosmic:hover {
            background: #fff;
            color: #000;
        }

        /* --- Profile Modal --- */
        #profile-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 6000;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.4s ease;
        }

        .profile-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
        }

        .profile-avatar-large {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 2px solid var(--border-dim);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .profile-tier {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            letter-spacing: 0.1em;
        }

        .profile-bio {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-main);
            margin-bottom: 25px;
            text-align: justify;
        }

        .profile-works {
            font-size: 11px;
            opacity: 0.6;
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Timeline --- */
        .timeline {
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px 200px;
        }

        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-dim);
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out forwards;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }


        /* --- Pop Art Avatar (Warhol Style) --- */
        .popart-avatar {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 0, 0, 0.9);
            transition: transform 0.2s;
        }

        .popart-avatar:hover {
            transform: scale(1.15) rotate(-3deg);
        }

        .popart-avatar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.05) 20%, rgba(0, 0, 0, 0.05) 40%, transparent 40%) 0 0 / 8px 8px;
            pointer-events: none;
            z-index: 1;
        }

        .popart-avatar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: popart-shimmer 4s linear infinite;
            pointer-events: none;
        }

        @keyframes popart-shimmer {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .popart-avatar .avatar-icon {
            position: relative;
            z-index: 2;
            filter: drop-shadow(1px 1px 0px rgba(0, 0, 0, 0.5));
        }

        .popart-avatar .avatar-tier {
            position: absolute;
            bottom: 2px;
            right: 3px;
            font-size: 8px;
            font-family: var(--font-sans);
            font-weight: 900;
            color: rgba(0, 0, 0, 0.7);
            z-index: 3;
            letter-spacing: 0;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .post-body {
            flex: 1;
            min-width: 0;
        }

        .post-author-line {
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .post-author-name {
            font-weight: 700;
            font-family: var(--font-sans);
            letter-spacing: 0.04em;
        }

        .post-author-works {
            font-size: 10px;
            opacity: 0.45;
            font-family: var(--font-outfit);
        }

        /* --- World Banner --- */
        .world-banner {
            position: fixed;
            top: 70px;
            right: 20px;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: var(--font-sans);
            font-weight: 800;
            z-index: 900;
            opacity: 0.6;
            border: 1px solid var(--border-dim);
        }

        .world-banner.peaceful {
            color: #aaa;
        }

        .world-banner.incident {
            color: #ff3333;
            background: rgba(255, 0, 0, 0.1);
            border-color: #ff3333;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        /* --- Input Area Enhancements --- */
        .input-floating {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 750px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 1001;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transition: var(--transition-smooth);
        }

        .input-floating:focus-within {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateX(-50%) translateY(-5px);
        }

        .void-input {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            font-family: var(--font-serif);
            font-size: 18px;
            resize: none;
            outline: none;
            margin-bottom: 10px;
        }

        /* --- Settings Modal Overhaul --- */
        #settingsModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            z-index: 7000;
            animation: fadeIn 0.5s ease;
        }

        .settings-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 50px 40px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), 0 0 40px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
        }

        .settings-title {
            font-family: var(--font-outfit);
            font-weight: 600;
            letter-spacing: 0.4em;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.8;
            color: var(--accent-salon);
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.5;
            margin-bottom: 8px;
            font-family: var(--font-sans);
        }

        .settings-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 15px;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .settings-input:focus {
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- Offering Modal --- */
        #offeringModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(40px);
            z-index: 8000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #fff;
            text-align: center;
        }

        .offering-content {
            max-width: 500px;
            animation: fadeIn 1s ease;
        }

        .offering-quote {
            font-family: var(--font-serif);
            font-size: 20px;
            line-height: 2;
            margin-bottom: 30px;
            color: #f5f5dc;
        }

        .offering-book {
            font-size: 14px;
            opacity: 0.6;
            font-family: var(--font-sans);
            letter-spacing: 0.1em;
        }

        .offering-timer {
            margin-top: 50px;
            font-family: var(--font-outfit);
            font-size: 12px;
            letter-spacing: 0.3em;
            opacity: 0.4;
        }

        .offering-k {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--accent-salon);
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .settings-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-amazon {
            background: #FF9900;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            font-family: var(--font-sans);
            transition: background 0.2s;
        }

        .btn-amazon:hover {
            background: #e68a00;
        }
    </style>
</head>

<body data-location="cafe">
    <div id="entrance-layer">
        <div class="k-dialog-box" id="k-dialog">
            <div style="font-size:40px; margin-bottom:20px;">🚪</div>
            <span id="k-typewriter"></span>
        </div>
        <div id="entrance-form" style="display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="userNameInput" class="k-input" placeholder="...">
            <button class="btn-cosmic" onclick="submitName()">名乗る</button>
        </div>
        <div id="location-select"
            style="display: none; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 600px;">
            <div id="k-map-intro"
                style="width:100%; text-align:center; margin-bottom:20px; font-size:16px; line-height:1.8;"></div>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <!-- World Map Modal -->
    <div id="mapModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:4000; overflow-y:auto;">
        <div style="max-width:700px; margin:40px auto; padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="font-family:var(--font-outfit); font-weight:300; letter-spacing:0.2em; margin:0;">🗺️ WORLD
                    MAP</h2>
                <button onclick="closeMap()"
                    style="background:none; border:1px solid rgba(255,255,255,0.3); color:#fff; padding:8px 20px; cursor:pointer; font-family:var(--font-sans); border-radius:6px;">✕
                    閉じる</button>
            </div>
            <div id="mapGrid"
                style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:12px;"></div>
        </div>
    </div>

    <header id="mainHeader">
        <div style="display:flex; align-items:center; gap:15px;">
            <button onclick="openMap()"
                style="background:none; border:none; font-size:24px; cursor:pointer; filter:none;">🗺️</button>
            <span id="currentLocIcon" style="font-size:20px;">☕</span>
        </div>
        <h1 id="appTitle">ITAPLA</h1>
        <div class="header-actions">
            <div id="soul-power" class="soul-power-container" title="魂の残量（霊力）">
                <span>💎</span>
                <span id="soul-power-value">100</span>
            </div>
            <div id="ai-status-badge">Auto</div>
            <div id="settings-trigger" style="cursor: pointer; font-size: 20px;" onclick="openSettings()">⚙️</div>
        </div>
    </header>

    <div class="world-banner" id="worldBanner">PEACEFUL</div>

    <div class="timeline" id="timeline"></div>

    <!-- AI Settings Modal -->
    <div id="settingsModal">
        <div class="settings-container">
            <h2 class="settings-title">⚙️ AI CONFIGURATION</h2>
            <div class="settings-group">
                <label class="settings-label">Gemini API Key</label>
                <input type="password" id="key-gemini" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group">
                <label class="settings-label">OpenAI API Key</label>
                <input type="password" id="key-openai" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group">
                <label class="settings-label">OpenRouter API Key</label>
                <input type="password" id="key-openrouter" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group">
                <label class="settings-label">DeepSeek API Key</label>
                <input type="password" id="key-deepseek" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group">
                <label class="settings-label">Mistral API Key</label>
                <input type="password" id="key-mistral" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group">
                <label class="settings-label">Hugging Face API Key</label>
                <input type="password" id="key-hf" class="settings-input" placeholder="...">
            </div>
            <div class="settings-group" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <label class="settings-label">Local Mind (WebLLM)</label>
                <button id="webllm-load-btn" class="btn-cosmic"
                    style="margin-top:0; width:100%; font-size:12px; padding:10px;" onclick="initWebLLM()">Load Local AI
                    Engine</button>
                <p style="font-size:9px; opacity:0.4; margin-top:8px; line-height:1.4;">
                    ※ブラウザ上でAIが直接動作します（約1GBの通信が発生）。<br>
                    クレジットを消費せず、オフラインでも「本物の知能」を維持できます。
                </p>
                <button class="btn-cosmic" style="margin-top:10px; width:100%; font-size:10px; opacity:0.3;"
                    onclick="localStorage.setItem('itapla_soul_power', 100); location.reload();">Reset Soul Power
                    (Debug)</button>
            </div>
            <div class="settings-actions">
                <button class="btn-cosmic"
                    style="margin:0; width:100%; border-radius:12px; font-size:16px; padding:15px; background:white; color:black;"
                    onclick="saveSettings()">OK</button>
            </div>
        </div>
    </div>

    <!-- Cultural Offering Modal -->
    <div id="offeringModal" style="display:none;">

        // --- Template Composition Engine (一期一会版) ---
        function composeDeepResponse(authorKey, userText) {
            const tmpl = deepTemplates[authorKey] || deepTemplates["default"];

            // 使用済み履歴の取得
            let used = JSON.parse(localStorage.getItem(`used_templates_${authorKey}`) || '{"starters":[], "bodies":[], "closers":[]}');

            const pickUnique = (arr, usedArr) => {
                const available = arr.filter((_, i) => !usedArr.includes(i));
                if (available.length === 0) {
                    // 全て使い切った場合は履歴をリセットして最初から（または純粋LLM生成へ移行のフラグ）
                    usedArr.length = 0;
                    return { val: arr[Math.floor(Math.random() * arr.length)], idx: -1 };
                }
                const originalIdx = Math.floor(Math.random() * available.length);
                const val = available[originalIdx];
                const realIdx = arr.indexOf(val);
                usedArr.push(realIdx);
                return { val, idx: realIdx };
            };

            const sObj = pickUnique(tmpl.starters, used.starters);
            const bObj = pickUnique(tmpl.bodies, used.bodies);
            const cObj = pickUnique(tmpl.closers, used.closers);

            // 履歴の保存
            localStorage.setItem(`used_templates_${authorKey}`, JSON.stringify(used));

            const starter = sObj.val.replace("${t}", userText);
            const body = bObj.val.replace("${t}", userText); // 念のためbody内の${t}も置換
            const closer = cObj.val;

            const roll = Math.random();
            if (roll < 0.7) return `${starter}\n\n${body}\n\n${closer}`;
            if (roll < 0.9) return `${starter} ${closer}`;
            return body;
        }

            });
            localStorage.setItem('cosmic_posts', JSON.stringify(posts));
            renderTimeline();
        }

        // --- Typewriter Effect for K ---
        function typewriterEffect(el, text, speed) {
            el.textContent = '';
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    el.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, speed);
        }

        // --- Profile Modal Logic ---
        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        // --- Map Modal ---
        function openMap() {
            const grid = document.getElementById('mapGrid');
            grid.innerHTML = '';
            Object.entries(worldLocations).forEach(([key, loc]) => {
                const isActive = key === currentLocation;
                const card = document.createElement('div');
                card.style.cssText = `
                    background: ${isActive ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)'};
                    border: 1px solid ${isActive ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.1)'};
                    border-radius: 12px; padding: 18px 14px; text-align: center;
                    cursor: pointer; transition: all 0.3s;
                    ${isActive ? 'box-shadow: 0 0 20px rgba(255,255,255,0.1);' : ''}
                `;
                card.innerHTML = `
                    <div style="font-size:32px; margin-bottom:8px;">${loc.icon}</div>
                    <div style="font-size:13px; font-weight:700; font-family:var(--font-sans);">${loc.name}</div>
                    <div style="font-size:10px; opacity:0.5; margin-top:4px; font-family:var(--font-outfit);">${loc.desc}</div>
                    ${isActive ? '<div style="font-size:9px; margin-top:6px; color:#00ff88; font-family:var(--font-sans);">📍 現在地</div>' : ''}
                `;
                card.onmouseenter = () => { if (!isActive) card.style.background = 'rgba(255,255,255,0.1)'; };
                card.onmouseleave = () => { if (!isActive) card.style.background = 'rgba(255,255,255,0.05)'; };
                card.onclick = () => {
                    if (!isActive) {
                        switchLocation(key);
                        closeMap();
                    }
                };
                grid.appendChild(card);
            });
            document.getElementById('mapModal').style.display = 'block';
        }

        function closeMap() {
            document.getElementById('mapModal').style.display = 'none';
        }


        function openSettings() {
            document.getElementById('key-gemini').value = localStorage.getItem('gemini_api_key') || "";
            document.getElementById('key-openai').value = localStorage.getItem('openai_api_key') || "";
            document.getElementById('key-openrouter').value = localStorage.getItem('openrouter_api_key') || "";
            document.getElementById('key-deepseek').value = localStorage.getItem('deepseek_api_key') || "";
            document.getElementById('key-mistral').value = localStorage.getItem('mistral_api_key') || "";
            document.getElementById('key-hf').value = localStorage.getItem('hf_api_key') || "";
            document.getElementById('settingsModal').style.display = 'block';
        }

        function saveSettings() {
            localStorage.setItem('gemini_api_key', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('openai_api_key', document.getElementById('key-openai').value.trim());
            localStorage.setItem('openrouter_api_key', document.getElementById('key-openrouter').value.trim());
            localStorage.setItem('deepseek_api_key', document.getElementById('key-deepseek').value.trim());
            localStorage.setItem('mistral_api_key', document.getElementById('key-mistral').value.trim());
            localStorage.setItem('hf_api_key', document.getElementById('key-hf').value.trim());
            document.getElementById('settingsModal').style.display = 'none';
        }

        // --- Phase 3: Narrative World & Mystery ---
        function setWorldState(newState) {
            worldState = newState;
            localStorage.setItem('world_state', worldState);
            document.getElementById('worldBanner').innerText = worldState;
            document.getElementById('worldBanner').className = `world-banner ${worldState.toLowerCase()}`;
        }

        async function triggerIncident() {
            if (worldState !== 'PEACEFUL') return;

            const locResidents = Object.keys(aiPersonalities).filter(k => aiPersonalities[k].loc === currentLocation);
            if (locResidents.length < 3) return;

            const victimKey = locResidents[Math.floor(Math.random() * locResidents.length)];
            const detectiveKey = locResidents.find(k => k !== victimKey) || locResidents[0];
            const suspectKeys = locResidents.filter(k => k !== victimKey && k !== detectiveKey);

            setWorldState('INCIDENT');

            const incidentPost = {
                id: Date.now(),
                text: `⚠ 【事件発生】 ${aiPersonalities[victimKey].name} が忽然と姿を消しました。現場には不可解な記号が残されています。`,
                author: "System",
                icon: "🚨",
                timestamp: Date.now(),
                location: currentLocation,
                isAI: true
            };
            posts.unshift(incidentPost);

            setTimeout(() => {
                const detective = aiPersonalities[detectiveKey];
                const callForHelp = {
                    id: Date.now() + 1,
                    text: `君！ 恐ろしいことが起きた。 ${detective.name} だが、この謎を解くには君の直感が必要だ。一緒に捜査してくれないか？`,
                    author: detective.name,
                    icon: detective.icon,
                    timestamp: Date.now(),
                    location: currentLocation,
                    isAI: true
                };
                posts.unshift(callForHelp);
                localStorage.setItem('cosmic_posts', JSON.stringify(posts));
                renderTimeline();
            }, 2000);
        }

        function checkAutonomousPulse() {
            const roll = Math.random();
            if (roll < 0.03) {
                triggerIncident();
            } else if (roll < 0.10) {
                // K's wandering appearance
                kWanders();
            } else if (roll < 0.20 && worldState === 'PEACEFUL') {
                // Background chatter
                const locResidents = Object.keys(aiPersonalities).filter(k => aiPersonalities[k].loc === currentLocation);
                if (locResidents.length === 0) return;
                const speakerKey = locResidents[Math.floor(Math.random() * locResidents.length)];
                const speaker = aiPersonalities[speakerKey];

                setTimeout(async () => {
                    const ctx = posts.slice(0, 5).map(p => `${p.author}: ${p.text}`).join('\n');
                    const reply = await callMultiAI(speaker, "...(独り言)...", ctx, "[AUTONOMOUS THOUGHT]");
                    posts.unshift({
                        id: Date.now(),
                        text: reply,
                        author: speaker.name,
                        icon: speaker.icon,
                        timestamp: Date.now(),
                        location: currentLocation,
                        isAI: true
                    });
                    renderTimeline();
                }, 1000);
            }
        }

        // K wanders and suggests a location
        function kWanders() {
            const pick = arr => arr[Math.floor(Math.random() * arr.length)];
            const otherLocs = Object.keys(worldLocations).filter(k => k !== currentLocation);
            const suggestedKey = pick(otherLocs);
            const suggestedLoc = worldLocations[suggestedKey];
            const msg = pick(kGuide.wandering)
                .replace(/\$\{name\}/g, userName || '旅人')
                .replace(/\$\{loc\}/g, `${suggestedLoc.icon} ${suggestedLoc.name}`);
            posts.unshift({
                id: Date.now(),
                text: msg,
                author: "K", icon: "🚪", timestamp: Date.now(), location: currentLocation, isAI: true
            });
            localStorage.setItem('cosmic_posts', JSON.stringify(posts));
            renderTimeline();
        }

        setInterval(checkAutonomousPulse, 60000);

        // --- Phase 1 Functions ---
        function applyLocation(loc) {
            document.body.setAttribute('data-location', loc);
            const locInfo = worldLocations[loc];
            document.getElementById('appTitle').innerText = locInfo ? `ITAPLA — ${locInfo.name}` : 'ITAPLA';
            const iconEl = document.getElementById('currentLocIcon');
            if (iconEl && locInfo) iconEl.textContent = locInfo.icon;

            currentLocation = loc;
            localStorage.setItem('current_location', loc);
        }

        function switchLocation(loc) {
            applyLocation(loc);
            initParticles();
            const locInfo = worldLocations[loc];
            // System message: moved
            posts.unshift({
                id: Date.now(),
                text: `（${locInfo.icon} ${locInfo.name}へ移動した）`,
                author: "System", icon: "🗺️", timestamp: Date.now(), location: loc, isAI: true
            });
            // Ambience: display the presence of others
            if (locInfo.ambience) {
                posts.unshift({
                    id: Date.now() + 1,
                    text: `🌫️ ${locInfo.ambience}`,
                    author: "場の気配", icon: locInfo.icon, timestamp: Date.now(), location: loc, isAI: true
                });
            }
            localStorage.setItem('cosmic_posts', JSON.stringify(posts));
            renderTimeline();
        }

        // Particle Logic
        let particles = [];
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const locInfo = worldLocations[currentLocation];
            const char = locInfo ? locInfo.particle : '✨';
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: 10 + Math.random() * 20,
                    v: 0.5 + Math.random(),
                    char: char,
                    o: 0.1 + Math.random() * 0.3
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255,255,255,${p.o})`;
                ctx.font = `${p.s}px serif`;
                ctx.fillText(p.char, p.x, p.y);
                p.y -= p.v;
                if (p.y < -30) p.y = canvas.height + 30;
            });
            requestAnimationFrame(drawParticles);
        }
        requestAnimationFrame(drawParticles);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- More to follow in next phases ---
        function renderTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = posts.map(p => {
                const authorKey = Object.keys(aiPersonalities).find(k => aiPersonalities[k].name === p.author) || '';
                const personality = aiPersonalities[authorKey];
                const worksText = personality ? personality.works : '';
                const avatarHtml = authorKey ? getPopArtAvatar(p.author, p.icon, authorKey) : `<div class="popart-avatar" style="background: linear-gradient(135deg, #333, #555);;"><span class="avatar-icon">${p.icon}</span></div>`;

                const avatarWithClick = personality ? `<div onclick="showProfile('${authorKey}')" style="cursor:pointer;">${avatarHtml}</div>` : avatarHtml;

                return `<div class="post-card">
                    ${avatarWithClick}
                    <div class="post-body">
                        <div class="post-author-line">
                            <span class="post-author-name">${p.author}</span>
                            ${worksText ? `<span class="post-author-works">${worksText}</span>` : ''}
                        </div>
                        <div style="line-height: 1.7;">${p.text}</div>
                        ${authorKey ? `<div style="margin-top: 8px; font-size: 11px; opacity: 0.5;">
                            <span style="cursor: pointer;" onclick="setReply('${authorKey}')">💬 Reply</span>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function showProfile(key) {
            const p = aiPersonalities[key];
            if (!p) return;
            const colors = popArtColors[key] || { bg: "#333", border: "#888" };

            const avatarEl = document.getElementById('p-avatar');
            avatarEl.style.background = colors.bg;
            avatarEl.style.borderColor = colors.border;
            avatarEl.textContent = p.icon;

            document.getElementById('p-name').textContent = p.name;
            document.getElementById('p-tier').textContent = p.level;
            document.getElementById('p-bio').textContent = p.bio;
            document.getElementById('p-works').textContent = p.works ? `代表作: ${p.works}` : '';

            const amazonContainer = document.getElementById('p-amazon-container');
            const amazonUrl = getAmazonUrl(p.asin || p.name);
            amazonContainer.innerHTML = amazonUrl ? `<a href="${amazonUrl}" target="_blank" class="btn-amazon" style="width:100%; justify-content:center;">🛒 Amazon で著書を探す</a>` : '';

            document.getElementById('profile-modal').style.display = 'flex';
        }
    </script>
</body>
